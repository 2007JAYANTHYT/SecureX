<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta name="google-site-verification" content="G2zKgLVOgaZCtPUZv9z9EH83ZnAnPodBsb7pfyXj8hY" />
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SecureX Security Dashboard — breach analysis, AI analyst, and security tools.">
  <title>SecureX | Dashboard</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <!-- Dashboard Navigation -->
  <nav class="dash-nav">
    <div class="dash-nav-inner">
      <a href="/" class="nav-brand" id="navHomeLink">
        <div class="nav-brand-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/></svg>
        </div>
        <span class="nav-brand-text">Secure<span>X</span></span>
      </a>
      <div class="dash-nav-links" id="navLinks">
        <button class="dash-nav-link active" data-tab="overview">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
          Overview
        </button>
        <button class="dash-nav-link" data-tab="breaches">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m13 13.5 2-2.5-2-2.5"/><path d="m21 21-3.5-3.5"/><circle cx="11" cy="11" r="8"/><path d="m11 7-2 4h4l-2 4"/></svg>
          Breaches
        </button>
        <button class="dash-nav-link" data-tab="ai">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/><path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"/><path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4"/><path d="M17.599 6.5a3 3 0 0 0 .399-1.375"/><path d="M6.003 5.125A3 3 0 0 0 6.401 6.5"/><path d="M3.477 10.896a4 4 0 0 1 .585-.396"/><path d="M19.938 10.5a4 4 0 0 1 .585.396"/><path d="M6 18a4 4 0 0 1-1.967-.516"/><path d="M19.967 17.484A4 4 0 0 1 18 18"/></svg>
          AI Analyst
        </button>
        <button class="dash-nav-link" data-tab="tools">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76Z"/></svg>
          Tools
        </button>
      </div>
      <div style="display:flex;align-items:center;gap:0.75rem;">
        <a href="/about" class="btn-ghost" style="text-decoration:none;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          About
        </a>
        <button class="btn-ghost" id="newScanBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
          New Scan
        </button>
      </div>
    </div>
  </nav>

  <!-- Dashboard Content -->
  <div class="dash-content">

    <!-- ═══════ OVERVIEW TAB ═══════ -->
    <div class="tab-panel active" id="tab-overview">
      <!-- Status Banner -->
      <div class="glass-card status-banner" id="statusBanner"></div>

      <!-- Risk Meter + Security Score -->
      <div class="overview-grid">
        <div class="glass-card" style="padding:1.5rem;">
          <div class="risk-meter" id="riskMeterContainer"></div>
        </div>
        <div class="glass-card" style="padding:1.5rem;">
          <div class="security-score" id="securityScoreContainer"></div>
        </div>
      </div>

      <!-- Neural Threat Model -->
      <div class="glass-card neural-panel" id="neuralPanel"></div>

      <!-- Insights & Recommendations -->
      <div class="insights-grid" id="insightsGrid"></div>
    </div>

    <!-- ═══════ BREACHES TAB ═══════ -->
    <div class="tab-panel" id="tab-breaches">
      <div id="breachesContent"></div>
    </div>

    <!-- ═══════ AI ANALYST TAB ═══════ -->
    <div class="tab-panel" id="tab-ai">
      <div class="ai-header">
        <div>
          <h1 class="page-title">AI Security Analyst</h1>
          <p class="page-subtitle">Get personalized security advice based on your scan results.</p>
        </div>
        <div class="ai-badges" id="aiBadges"></div>
      </div>
      <div class="glass-card chat-container">
        <div class="chat-messages custom-scrollbar" id="chatMessages"></div>
        <div class="chat-input-area">
          <div class="chat-input-wrapper">
            <input type="text" class="chat-input" id="chatInput" placeholder="Ask about your security..." autocomplete="off">
            <button class="chat-send-btn" id="chatSendBtn" disabled>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- ═══════ TOOLS TAB ═══════ -->
    <div class="tab-panel" id="tab-tools">
      <div class="page-header">
        <h1 class="page-title">Security Toolkit</h1>
        <p class="page-subtitle">Password generation, strength analysis, and dark web monitoring.</p>
      </div>
      <div class="tool-switcher" id="toolSwitcher"></div>
      <div id="toolPanels"></div>
    </div>
  </div>

  <script src="/static/js/dashboard.js"></script>
</body>
</html>
